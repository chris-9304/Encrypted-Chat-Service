name: Lint

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  clang_format:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install LLVM (for clang-format)
      run: choco install llvm -y

    - name: Run clang-format check
      run: |
        $files = Get-ChildItem -Path src,tests,include -Include *.cpp,*.h -Recurse
        foreach ($file in $files) {
            clang-format --dry-run -Werror $file.FullName
            if ($LASTEXITCODE -ne 0) {
                Write-Error "clang-format check failed on $file"
                exit 1
            }
        }
